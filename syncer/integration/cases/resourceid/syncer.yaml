apiVersion: syncer.gkelabs.io/v1alpha1
kind: KRMSyncer
metadata:
  name: resourceid-syncer
  namespace: default
spec:
  remote:
    clusterConfig:
      kubeConfigSecretRef:
        name: remote-kubeconfig
  rules:
  - group: e2e.gkelabs.io
    version: v1alpha1
    kind: TestCRD
    syncFields: ["spec.resourceID", "status"]
